<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="../assets/icon/icon_aksaraloka.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrasi — AksaraLoka</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../Pages/css/register-style.css"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            nunito: ['Cinzel', 'serif'],
            poppins: ['Poppins', 'sans-serif']
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity:'0', transform:'translateY(24px)' },
              '100%': { opacity:'1', transform:'translateY(0)' }
            },
            shimmer: {
              '0%,100%': { opacity:'.7' },
              '50%': { opacity:'1' }
            },
          },
          animation: {
            'fade-up': 'fadeUp 0.7s ease both',
            shimmer: 'shimmer 3s ease-in-out infinite',
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 bg-pattern relative overflow-hidden">

  <!-- Floating Aksara -->
  <div class="absolute inset-0 overflow-hidden select-none" aria-hidden="true">
    <span class="float-char absolute text-white/20 text-6xl font-black" style="top:8%; left:5%; animation-duration:7s;">ꦲ</span>
    <span class="float-char absolute text-white/15 text-4xl font-black" style="top:20%; left:80%; animation-duration:9s;">ꦤ</span>
    <span class="float-char absolute text-white/20 text-5xl font-black" style="top:60%; left:10%; animation-duration:8s;">ꦏ</span>
    <span class="float-char absolute text-white/15 text-3xl font-black" style="top:75%; left:75%; animation-duration:10s;">ꦱ</span>
    <span class="float-char absolute text-white/10 text-7xl font-black" style="top:45%; left:88%; animation-duration:12s;">ꦗ</span>
    <span class="float-char absolute text-white/10 text-5xl font-black" style="top:85%; left:40%; animation-duration:11s;">ꦩ</span>
  </div>

  <div class="w-full max-w-md relative z-10" style="animation: fadeUp 0.7s ease both;">

    <a href="../index.html" class="inline-flex items-center gap-1.5 text-white/70 hover:text-white text-xs font-semibold mb-5">
      ← Kembali ke Beranda
    </a>

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <div class="bg-[#fff3e0] px-8 pt-8 pb-6 border-b border-[#e8d0b0]">
        <a href="../index.html" class="text-[#6b3f00] font-black text-xl font-nunito block mb-3">AksaraLoka</a>
        <h1 class="text-2xl font-black text-[#6b3f00] font-nunito">Buat Profilmu</h1>
        <p class="text-sm text-gray-500 mt-1">Daftar gratis dan mulai belajar Aksara Nusantara!</p>
      </div>

      <div class="px-8 py-7">
        <form id="registrationForm" class="space-y-4" novalidate>

          <!-- Nama -->
          <div class="space-y-1.5">
            <label class="label" for="nama">Nama Pengguna</label>
            <input type="text" id="nama" name="nama" required
                   autocomplete="name"
                   maxlength="50"
                   placeholder="Contoh: Budi Santoso"
                   class="form-input"/>
            <p id="namaErr" class="error-text hidden"></p>
          </div>

          <!-- Email -->
          <div class="space-y-1.5">
            <label class="label" for="email">Email</label>
            <input type="email" id="email" name="email" required
                   autocomplete="email"
                   placeholder="contoh@email.com"
                   class="form-input"/>
            <p id="emailErr" class="error-text hidden"></p>
          </div>

          <!-- Password -->
          <div class="space-y-1.5">
            <label class="label" for="password">Kata Sandi</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" required
                     autocomplete="new-password"
                     placeholder="Min. 8 karakter"
                     class="form-input pr-10"/>
              <button type="button" class="eye-btn" id="eyeBtn" aria-label="Tampilkan password">
                <span id="eyeIcon">🙈</span>
              </button>
            </div>

            <!-- Strength Bars -->
            <div class="flex gap-1 mt-1.5">
              <div class="bar" id="bar1"></div>
              <div class="bar" id="bar2"></div>
              <div class="bar" id="bar3"></div>
              <div class="bar" id="bar4"></div>
            </div>
            <p id="strengthLabel" class="hidden text-xs mt-1"></p>
            <p id="passErr" class="error-text hidden"></p>
          </div>

          <!-- Konfirmasi Password — BARU -->
          <div class="space-y-1.5">
            <label class="label" for="confirmPassword">Konfirmasi Kata Sandi</label>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" name="confirmPassword" required
                     autocomplete="new-password"
                     placeholder="Ulangi kata sandi"
                     class="form-input pr-10"/>
              <button type="button" class="eye-btn" id="eyeBtn2" aria-label="Tampilkan konfirmasi password">
                <span id="eyeIcon2">🙈</span>
              </button>
            </div>
            <p id="confirmErr" class="error-text hidden"></p>
          </div>

          <!-- Notifikasi -->
          <div id="notif" class="hidden notif" role="alert"></div>

          <button type="submit" class="btn-primary">Buat Akun</button>

          <p class="text-center text-xs text-gray-400 mt-2">
            Sudah punya akun?
            <a href="login.html" class="text-[#aa6d11] font-semibold hover:underline">Masuk di sini</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script src="../Pages/js/register-page.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profil</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind.config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<body class="bg-[#fdf8f3] font-poppins text-gray-800">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-[#e8d0b0] bg-white">
    <a href="profil.html" class="text-xl">←</a>
    <h1 class="text-lg font-bold text-[#6b3f00]">Profil</h1>
    <div></div>
  </div>

  <main class="max-w-md mx-auto px-6 py-8">

    <!-- AVATAR -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-24 h-24 rounded-full border-2 border-dashed border-gray-400 flex items-center justify-center text-3xl text-gray-400">
        H
      </div>
      <button class="mt-3 text-sm font-bold text-[#aa6d11] hover:underline">
        UBAH AVATAR
      </button>
    </div>

    <!-- FORM -->
    <form class="space-y-5">

      <!-- NAME -->
      <div>
        <label class="block text-sm font-semibold mb-1">Name Pengguna</label>
        <input type="text" name="nama"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#aa6d11]"/>
      </div>

           <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold mb-1">Email</label>
        <input type="email" name="email"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#aa6d11]"/>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold mb-1">Password</label>
        <input type="password" name="password"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#aa6d11]"/>
      </div>

      <!-- BUTTON SIMPAN -->
      <button type="submit"
        class="w-full text-white font-bold py-3 rounded-xl bg-[#aa6d11] border-b-4 border-[#6b3f00] hover:bg-[#7a4d09] hover:translate-y-0.5 hover:border-b-2 active:translate-y-1 active:border-b-0 transition-all">
        Simpan Perubahan
      </button>

      <!-- BUTTON DELETE -->
      <button type="button"
        class="w-full text-red-600 font-bold py-3 rounded-xl border border-red-300 bg-red-50 hover:bg-red-100 transition">
        Hapus Akun
      </button>

    </form>

  </main>

  <script src="js/profiledit.js"></script>
</body>
</html>

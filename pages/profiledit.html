<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profil</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind.config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<body class="bg-[#fdf8f3] font-poppins text-gray-800">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-[#e8d0b0] bg-white">
    <a href="profil.html" class="text-xl">←</a>
    <h1 class="text-lg font-bold text-[#6b3f00]">Edit Profil</h1>
    <div></div>
  </div>

  <main class="max-w-md mx-auto px-6 py-8">

    <!-- AVATAR -->
    <div class="flex flex-col items-center mb-8">
      <div id="avatarInitial"
        class="w-24 h-24 rounded-full bg-[#fff3e0] border-2 border-dashed border-[#aa6d11] flex items-center justify-center text-3xl font-bold text-[#aa6d11]">
        ?
      </div>
    </div>

    <!-- PESAN GLOBAL (sukses/error) -->
    <div id="pesanGlobal" class="hidden mb-4 p-3 rounded-xl text-sm font-semibold"></div>

    <!-- FORM -->
    <form id="formProfil" class="space-y-5">

      <!-- NAMA -->
      <div>
        <label class="block text-sm font-semibold mb-1">Nama Pengguna</label>
        <input type="text" name="nama"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#aa6d11]"/>
        <p id="error_nama" class="hidden mt-1 text-xs text-red-500"></p>
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold mb-1">Email</label>
        <input type="email" name="email"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#aa6d11]"/>
        <p id="error_email" class="hidden mt-1 text-xs text-red-500"></p>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold mb-1">Password Baru
          <span class="text-gray-400 font-normal">(kosongkan jika tidak ingin ganti)</span>
        </label>
        <input type="password" name="password" placeholder="Min. 8 karakter"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#aa6d11]"/>
        <p id="error_password" class="hidden mt-1 text-xs text-red-500"></p>
      </div>

      <!-- TOMBOL SIMPAN -->
      <button id="btnSimpan" type="submit"
        class="w-full text-white font-bold py-3 rounded-xl bg-[#aa6d11] border-b-4 border-[#6b3f00]
               hover:bg-[#7a4d09] hover:translate-y-0.5 hover:border-b-2
               active:translate-y-1 active:border-b-0 transition-all
               disabled:opacity-60 disabled:cursor-not-allowed">
        Simpan Perubahan
      </button>

      <!-- TOMBOL HAPUS AKUN -->
      <button id="btnHapusAkun" type="button"
        class="w-full text-red-600 font-bold py-3 rounded-xl border border-red-300 bg-red-50 hover:bg-red-100 transition">
        Hapus Akun
      </button>

    </form>
  </main>

  <!-- MODAL KONFIRMASI HAPUS AKUN -->
  <div id="modalHapus"
    class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-6">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">

      <h2 class="text-lg font-black text-red-600 mb-2">Hapus Akun</h2>
      <p class="text-sm text-gray-600 mb-4">
        Tindakan ini <strong>tidak dapat dibatalkan</strong>. Masukkan kata sandi untuk mengonfirmasi penghapusan akun.
      </p>

      <input id="inputKonfirmasiPassword" type="password"
        placeholder="Kata sandi kamu"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-red-400 mb-1"/>
      <p id="errorKonfirmasi" class="text-xs text-red-500 mb-4 min-h-[1rem]"></p>

      <div class="flex gap-3">
        <button id="btnBatalHapus"
          class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-700 font-semibold hover:bg-gray-100 transition">
          Batal
        </button>
        <button id="btnKonfirmasiHapus"
          class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 transition
                 disabled:opacity-60 disabled:cursor-not-allowed">
          Ya, Hapus Akun
        </button>
      </div>

    </div>
  </div>

  <script src="js/profiledit.js"></script>
</body>
</html>

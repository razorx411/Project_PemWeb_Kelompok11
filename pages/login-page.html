<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="../assets/icons/icon_aksaraloka.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk — AksaraLoka</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .bg-pattern {
      background-color: #6b3f00;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 18px, rgba(255,255,255,0.04) 18px),
        repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(255,255,255,0.04) 18px);
    }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.7s ease both; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            nunito:  ['Cinzel', 'serif'],
            poppins: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 bg-pattern relative overflow-hidden">

  <div class="w-full max-w-md relative z-10 animate-fade-up">

    <a href="../index.html" class="inline-flex items-center gap-1.5 text-white/70 hover:text-white text-xs font-semibold mb-5 transition-colors">
      ← Kembali ke Beranda
    </a>

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- Header card -->
      <div class="bg-[#fff3e0] px-8 pt-8 pb-6 border-b border-[#e8d0b0]">
        <a href="../index.html" class="text-[#6b3f00] font-black text-xl font-nunito block mb-3 hover:opacity-80 transition-opacity">AksaraLoka</a>
        <h1 class="text-2xl font-black text-[#6b3f00] font-nunito">Selamat Datang!</h1>
        <p class="text-sm text-gray-500 mt-1">Masuk dan lanjutkan belajar Aksara Nusantara.</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-7">
        <form id="loginForm" class="space-y-4" novalidate>

          <!-- Email -->
          <div class="space-y-1.5">
            <label class="block text-sm font-semibold text-gray-700" for="email">Email</label>
            <input type="email" id="email" name="email" required
                   autocomplete="email"
                   placeholder="contoh@email.com"
                   class="w-full px-4 py-3 border-2 border-[#e8d0b0] rounded-2xl bg-[#fdf8f3] text-sm
                          focus:outline-none focus:border-[#aa6d11] focus:bg-white focus:ring-2 focus:ring-[#aa6d11]/20
                          transition-all duration-200"/>
            <p id="emailErr" class="hidden text-xs text-red-500"></p>
          </div>

          <!-- Password -->
          <div class="space-y-1.5">
            <label class="block text-sm font-semibold text-gray-700" for="password">Kata Sandi</label>
            <div class="relative">
              <input type="password" id="password" name="password" required
                     autocomplete="current-password"
                     placeholder="Kata sandi kamu"
                     class="w-full px-4 py-3 pr-11 border-2 border-[#e8d0b0] rounded-2xl bg-[#fdf8f3] text-sm
                            focus:outline-none focus:border-[#aa6d11] focus:bg-white focus:ring-2 focus:ring-[#aa6d11]/20
                            transition-all duration-200"/>
              <button type="button" id="eyeBtn"
                      class="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center opacity-60 hover:opacity-100 transition-opacity"
                      aria-label="Tampilkan password">
                <img id="eyeIcon" src="../assets/icons/icon_hidden.png" alt="toggle password" class="w-5 h-5 object-contain"/>
              </button>
            </div>
            <p id="passErr" class="hidden text-xs text-red-500"></p>
          </div>

          <!-- Notifikasi -->
          <div id="notif" class="hidden px-4 py-3 rounded-xl text-sm font-medium" role="alert"></div>

          <!-- Submit -->
          <button type="submit"
                  class="w-full bg-[#aa6d11] text-white font-bold text-sm uppercase tracking-widest
                         py-4 rounded-2xl border-b-4 border-[#6b3f00]
                         hover:bg-[#7a4d09] hover:translate-y-0.5 hover:border-b-2
                         active:translate-y-1 active:border-b-0
                         transition-all duration-100 mt-2">
            Masuk
          </button>

          <p class="text-center text-xs text-gray-400 mt-2">
            Belum punya akun?
            <a href="register-page.html" class="text-[#aa6d11] font-semibold hover:underline">Daftar di sini</a>
          </p>

        </form>
      </div>
    </div>
  </div>

  <script src="js/login-page.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — AksaraLoka</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind.config.js"></script>

  <!-- Font sama kayak contact -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<body class="bg-[#fdf8f3] text-gray-800 min-h-screen font-poppins">

  <!-- NAVBAR (copy dari contact biar konsisten) -->
  <header class="w-full border-b border-[#e8d0b0] bg-white sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="../pages/home-page.html" class="font-black text-[#6b3f00] text-lg font-nunito">AksaraLoka</a>
 
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10">
uuuuuuuuuuuu
    <!-- CARD PROFILE -->
    <div class="bg-white rounded-2xl border border-[#e8d0b0] overflow-hidden shadow-sm">

      <!-- COVER -->
      <div class="h-24 bg-[#6b3f00] relative">
        <div class="absolute inset-0 opacity-10"
          style="background-image: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.3) 20px, rgba(255,255,255,0.3) 21px);">
        </div>
      </div>

      <!-- PROFILE INFO -->
      <div class="px-6 pb-6">

        <!-- AVATAR -->
        <div class="flex justify-center -mt-16 relative z-10">
          <div class="w-28 h-28 rounded-full bg-[#fff3e0] border-4 border-white flex items-center justify-center text-3xl">
            👤
          </div>
        </div>

        <!-- NAME -->
        <div class="text-center mt-4">
          <h1 id="profileName" class="text-xl font-black text-[#6b3f00] font-nunito">...</h1>
          <p id="profileUsername" class="text-sm text-gray-500">...</p>
        </div>

        <!-- FOLLOW INFO -->
        <div class="flex justify-center gap-10 mt-6 text-sm font-semibold">
          <div class="text-center">
            <p class="text-[#6b3f00] font-black">0</p>
            <p class="text-gray-500">Following</p>
          </div>
          <div class="text-center">
            <p class="text-[#6b3f00] font-black">0</p>
            <p class="text-gray-500">Followers</p>
          </div>
        </div>

        <!-- BUTTON EDIT -->
        <div class="mt-6">
            <a href="profiledit.html">
                <button 
                    class="w-full text-white font-black text-sm uppercase tracking-widest py-3 rounded-xl bg-[#aa6d11] border-b-4 border-[#6b3f00] hover:bg-[#7a4d09] hover:translate-y-0.5 hover:border-b-2 active:translate-y-1 active:border-b-0 transition-all duration-100 font-nunito">
                    Edit Profil
                </button>
            </a>
        </div>

      </div>
    </div>

  </main>

  <script>
window.addEventListener("DOMContentLoaded", async () => {
  // Coba ambil dari API dulu (session), fallback ke localStorage
  try {
    const res = await fetch("../api/get_profil.php", { credentials: "include" });
    const data = await res.json();
    if (data.success && data.user) {
      const nama = data.user.nama || "Pengguna";
      document.getElementById("profileName").textContent = nama;
      document.getElementById("profileUsername").textContent = "@" + nama.replace(/\s+/g,'').toLowerCase();
      return;
    }
  } catch(e) {}
  // Fallback: localStorage
  try {
    const u = JSON.parse(localStorage.getItem('user'));
    if (u && u.nama) {
      document.getElementById("profileName").textContent = u.nama;
      document.getElementById("profileUsername").textContent = "@" + u.nama.replace(/\s+/g,'').toLowerCase();
    }
  } catch(e) {}
});
</script>

</body>
</html>
